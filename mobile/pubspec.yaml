name: abem_mobile
description: ABEM – Apartment & Building Expense Management (Flutter Mobile)
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # State management (BLoC)
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Firebase push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.4

  # Local notifications
  flutter_local_notifications: ^17.2.3

  # Camera / gallery for bill uploads
  image_picker: ^1.1.2

  # Navigation
  go_router: ^14.4.1

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.0
  cached_network_image: ^3.4.1

  # UI
  fl_chart: ^0.69.0
  flutter_svg: ^2.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/abem-app-icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/abem-app-icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/abem-splash.png
  android: true
  ios: false
