name: abem_mobile
description: ABEM – Apartment & Building Expense Management (Flutter Mobile)
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_hive_store: ^3.2.1

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # State management (BLoC)
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Firebase push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.4

  # Local notifications
  flutter_local_notifications: ^17.2.3

  # Camera / gallery for bill uploads
  image_picker: ^1.1.2
  flutter_image_compress: ^2.1.0

  # Navigation
  go_router: ^14.4.1

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.0
  internet_connection_checker: ^1.0.0
  cached_network_image: ^3.4.1
  package_info_plus: ^5.0.1
  permission_handler: ^11.3.1

  # Local cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  google_mobile_ads: ^4.0.0
  flutter_pdfview: ^1.3.2

  # Form validation
  formz: ^0.7.0

  # Functional
  dartz: ^0.10.1

  # Code generation annotations
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1
  http_mock_adapter: ^0.6.1

# App icon configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/abem-app-icon.svg"
  adaptive_icon_background: "#1A6B5A"

# Splash screen configuration
flutter_native_splash:
  color: "#1A6B5A"
  color_dark: "#141A18"
  image: assets/images/abem-splash.svg
  android_12:
    image: assets/images/abem-splash.svg
    icon_background_color: "#1A6B5A"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
