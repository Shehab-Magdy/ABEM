  <!-- Loading bar -->
  <rect x="155" y="780" width="120" height="3" rx="1.5" fill="white" opacity="0.1"/>
  <rect x="155" y="780" width="60" height="3" rx="1.5" fill="#3B82F6" opacity="0.8"/>

