<svg width="430" height="932" viewBox="0 0 430 932" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="splashBg" x1="0" y1="0" x2="430" y2="932" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="55%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="430" height="932" fill="url(#splashBg)"/>
  <!-- Decorative circles -->
  <circle cx="380" cy="120" r="240" fill="white" opacity="0.025"/>
  <circle cx="50" cy="812" r="200" fill="#10B981" opacity="0.06"/>
  <circle cx="380" cy="120" r="140" fill="white" opacity="0.02"/>
  <!-- Subtle grid -->
  <g opacity="0.03" stroke="white" stroke-width="1">
    <line x1="0" y1="116" x2="430" y2="116"/><line x1="0" y1="232" x2="430" y2="232"/>
    <line x1="0" y1="348" x2="430" y2="348"/><line x1="0" y1="464" x2="430" y2="464"/>
    <line x1="0" y1="580" x2="430" y2="580"/><line x1="0" y1="696" x2="430" y2="696"/>
    <line x1="0" y1="812" x2="430" y2="812"/>
    <line x1="86" y1="0" x2="86" y2="932"/><line x1="172" y1="0" x2="172" y2="932"/>
    <line x1="258" y1="0" x2="258" y2="932"/><line x1="344" y1="0" x2="344" y2="932"/>
  </g>

  <!-- App Icon -->
  <rect x="155" y="330" width="120" height="120" rx="28" fill="url(#iconGrad)"/>
  <!-- Building shapes inside icon -->
  <rect x="170" y="352" width="34" height="66" rx="4" fill="white" opacity="0.22"/>
  <rect x="216" y="362" width="34" height="56" rx="4" fill="white" opacity="0.15"/>
  <!-- Windows -->
  <rect x="177" y="362" width="8" height="8" rx="2" fill="white" opacity="0.8"/>
  <rect x="189" y="362" width="8" height="8" rx="2" fill="white" opacity="0.8"/>
  <rect x="177" y="376" width="8" height="8" rx="2" fill="white" opacity="0.8"/>
  <rect x="189" y="376" width="8" height="8" rx="2" fill="white" opacity="0.65"/>
  <!-- Growth bars -->
  <rect x="177" y="396" width="8" height="22" rx="2" fill="#34D399"/>
  <rect x="188" y="390" width="8" height="28" rx="2" fill="#34D399"/>
  <rect x="199" y="384" width="8" height="34" rx="2" fill="#FCD34D"/>
  <rect x="223" y="386" width="8" height="32" rx="2" fill="#34D399" opacity="0.9"/>
  <rect x="234" y="380" width="8" height="38" rx="2" fill="#FCD34D" opacity="0.9"/>

  <!-- App name -->
  <text x="215" y="492" font-family="system-ui, -apple-system, Arial, sans-serif" font-size="40" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">ABEM</text>
  <text x="215" y="524" font-family="system-ui, -apple-system, Arial, sans-serif" font-size="14" font-weight="400" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="3">EXPENSE MANAGEMENT</text>

