<!-- ABEM Payment & Notification Icons -->
<svg width="480" height="200" viewBox="0 0 480 200" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- === PAYMENT ICONS row 1 === -->

  <!-- Cash -->
  <rect x="4" y="4" width="52" height="52" rx="14" fill="#ECFDF5"/>
  <rect x="10" y="18" width="40" height="24" rx="4" stroke="#10B981" stroke-width="2" fill="#D1FAE5"/>
  <circle cx="30" cy="30" r="5" stroke="#10B981" stroke-width="2" fill="none"/>
  <circle cx="14" cy="30" r="1.5" fill="#10B981"/>
  <circle cx="46" cy="30" r="1.5" fill="#10B981"/>
  <text x="30" y="70" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Cash</text>

  <!-- Bank Transfer -->
  <rect x="64" y="4" width="52" height="52" rx="14" fill="#EFF6FF"/>
  <path d="M70 32h40M70 38h40M74 20h32L90 12 74 20z" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="76" y1="32" x2="76" y2="46" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="90" y1="32" x2="90" y2="46" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="104" y1="32" x2="104" y2="46" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="68" y1="46" x2="112" y2="46" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
  <text x="90" y="70" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Bank</text>

  <!-- Balance / Credit -->
  <rect x="124" y="4" width="52" height="52" rx="14" fill="#F0FDF4"/>
  <path d="M150 10v40M138 18h24a8 8 0 010 16h-24" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="150" y="70" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Balance</text>

  <!-- Paid -->
  <rect x="184" y="4" width="52" height="52" rx="14" fill="#ECFDF5"/>
  <circle cx="210" cy="30" r="18" stroke="#10B981" stroke-width="2" fill="#D1FAE5"/>
  <path d="M203 30l5 5 9-9" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="210" y="70" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Paid</text>

  <!-- Partial -->
  <rect x="244" y="4" width="52" height="52" rx="14" fill="#FFFBEB"/>
  <circle cx="270" cy="30" r="18" stroke="#F59E0B" stroke-width="2" fill="#FEF3C7"/>
  <path d="M270 16v14l7 4" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="270" y="70" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Partial</text>

  <!-- Overdue -->
  <rect x="304" y="4" width="52" height="52" rx="14" fill="#FEF2F2"/>
  <circle cx="330" cy="30" r="18" stroke="#EF4444" stroke-width="2" fill="#FEE2E2"/>
  <line x1="330" y1="18" x2="330" y2="28" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="330" cy="34" r="2" fill="#EF4444"/>
  <text x="330" y="70" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Overdue</text>

  <!-- Receipt -->
  <rect x="364" y="4" width="52" height="52" rx="14" fill="#EFF6FF"/>
  <path d="M374 10h32v36l-4-4-4 4-4-4-4 4-4-4-4 4V10z" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="#DBEAFE"/>
  <line x1="379" y1="20" x2="401" y2="20" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="379" y1="26" x2="401" y2="26" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="379" y1="32" x2="390" y2="32" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
  <text x="390" y="70" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Receipt</text>

  <!-- Export -->
  <rect x="424" y="4" width="52" height="52" rx="14" fill="#F5F3FF"/>
  <path d="M464 34v8a2 2 0 01-2 2h-24a2 2 0 01-2-2v-8" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" fill="none"/>
  <polyline points="450,24 446,30 442,24" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="446" y1="14" x2="446" y2="30" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
  <text x="450" y="70" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Export</text>

  <!-- === NOTIFICATION ICONS row 2 === -->

  <!-- Due Soon -->
  <rect x="4" y="104" width="52" height="52" rx="14" fill="#FFFBEB"/>
  <path d="M30 112a14 14 0 0114 14c0 10 4 14 4 14H12s4-4 4-14a14 14 0 0114-14z" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="#FEF3C7"/>
  <path d="M26.5 144a3.5 3.5 0 007 0" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <text x="30" y="170" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Due Soon</text>

  <!-- Confirmed -->
  <rect x="64" y="104" width="52" height="52" rx="14" fill="#ECFDF5"/>
  <path d="M90 112a14 14 0 0114 14c0 10 4 14 4 14H72s4-4 4-14a14 14 0 0114-14z" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="#D1FAE5"/>
  <path d="M86.5 144a3.5 3.5 0 007 0" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  <circle cx="102" cy="115" r="6" fill="#10B981"/>
  <path d="M99.5 115l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="90" y="170" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Confirmed</text>

  <!-- Overdue Alert -->
  <rect x="124" y="104" width="52" height="52" rx="14" fill="#FEF2F2"/>
  <path d="M150 112a14 14 0 0114 14c0 10 4 14 4 14h-36s4-4 4-14a14 14 0 0114-14z" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="#FEE2E2"/>
  <path d="M146.5 144a3.5 3.5 0 007 0" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
  <circle cx="162" cy="115" r="6" fill="#EF4444"/>
  <line x1="162" y1="112" x2="162" y2="116" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="162" cy="119" r="1" fill="white"/>
  <text x="150" y="170" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Overdue</text>

  <!-- New Expense -->
  <rect x="184" y="104" width="52" height="52" rx="14" fill="#EFF6FF"/>
  <path d="M210 112a14 14 0 0114 14c0 10 4 14 4 14h-36s4-4 4-14a14 14 0 0114-14z" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="#DBEAFE"/>
  <path d="M206.5 144a3.5 3.5 0 007 0" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
  <circle cx="222" cy="115" r="6" fill="#2563EB"/>
  <path d="M222 112v6M219 115h6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <text x="210" y="170" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">New Expense</text>

  <!-- All Clear / Read -->
  <rect x="244" y="104" width="52" height="52" rx="14" fill="#F0FDF4"/>
  <path d="M270 112a14 14 0 0114 14c0 10 4 14 4 14h-36s4-4 4-14a14 14 0 0114-14z" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="#D1FAE5" stroke-dasharray="3 2" opacity="0.6"/>
  <path d="M266.5 144a3.5 3.5 0 007 0" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <text x="270" y="170" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Read</text>

</svg>
