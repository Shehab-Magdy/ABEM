<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ABEM{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:#F9FAFB;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#F9FAFB;padding:32px 0;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="background:#FFFFFF;border-radius:12px;overflow:hidden;">
        <tr>
          <td style="background:#1E3A8A;padding:24px 32px;">
            <span style="color:white;font-size:22px;font-weight:700;">ABEM</span>
            <span style="color:rgba(255,255,255,0.6);font-size:13px;margin-left:8px;">Expense Management</span>
          </td>
        </tr>
        <tr>
          <td style="padding:32px;">
            {% block content %}{% endblock %}
          </td>
        </tr>
        <tr>
          <td style="background:#F3F4F6;padding:20px 32px;text-align:center;">
            <p style="color:#6B7280;font-size:12px;margin:0;">&copy; 2026 ABEM — Apartment & Building Expense Management</p>
            <p style="color:#9CA3AF;font-size:11px;margin:6px 0 0;">You are receiving this because you are registered on the ABEM platform.</p>
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
