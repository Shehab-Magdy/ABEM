<!-- ABEM Expense Category Icons - All 8 icons in one reference SVG -->
<svg width="480" height="120" viewBox="0 0 480 120" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Water -->
  <rect x="4" y="4" width="52" height="52" rx="14" fill="#EFF6FF"/>
  <path d="M30 14C30 14 22 22 22 27a8 8 0 0016 0c0-5-8-13-8-13z" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="#DBEAFE"/>
  <path d="M25 28a4 4 0 004 3" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
  <text x="30" y="72" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Water</text>

  <!-- Electricity -->
  <rect x="64" y="4" width="52" height="52" rx="14" fill="#FFFBEB"/>
  <polygon points="96,13 88,25 93,25 92,35 100,23 95,23" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="#FEF3C7"/>
  <text x="90" y="72" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Electricity</text>

  <!-- Maintenance -->
  <rect x="124" y="4" width="52" height="52" rx="14" fill="#F0FDF4"/>
  <path d="M151.5 17.5l-3-3a2 2 0 00-2.83 0l-11 11a2 2 0 000 2.83l3 3a2 2 0 002.83 0l11-11a2 2 0 000-2.83z" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="#D1FAE5"/>
  <path d="M147 14l4 4" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  <circle cx="150" cy="45" r="3" stroke="#10B981" stroke-width="2" fill="none"/>
  <text x="150" y="72" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Maintenance</text>

  <!-- Elevator -->
  <rect x="184" y="4" width="52" height="52" rx="14" fill="#F5F3FF"/>
  <rect x="190" y="10" width="40" height="40" rx="6" stroke="#7C3AED" stroke-width="2" fill="#EDE9FE"/>
  <path d="M200 29l10-8 10 8" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M200 34l10 8 10-8" stroke="#7C3AED" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="210" y="72" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Elevator</text>

  <!-- Cleaning -->
  <rect x="244" y="4" width="52" height="52" rx="14" fill="#ECFDF5"/>
  <path d="M256 46l2-8h12l2 8h-16z" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="#D1FAE5"/>
  <path d="M270 38v-8" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
  <path d="M266 30h8" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
  <circle cx="270" cy="28" r="1.5" fill="#059669"/>
  <text x="270" y="72" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Cleaning</text>

  <!-- Gas -->
  <rect x="304" y="4" width="52" height="52" rx="14" fill="#FFF7ED"/>
  <path d="M330 46c-5 0-8-4-5-8 1 2 3 2 4 0 2 3 5 1 5-1 0 5-4 9-4 9z" stroke="#EA580C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="#FED7AA"/>
  <path d="M330 30c0 0-4 5-2 8" stroke="#EA580C" stroke-width="1.5" stroke-linecap="round"/>
  <text x="330" y="72" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Gas</text>

  <!-- Security -->
  <rect x="364" y="4" width="52" height="52" rx="14" fill="#EFF6FF"/>
  <path d="M390 13l9 4v7c0 5-4 9-9 11c-5-2-9-6-9-11v-7l9-4z" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="#DBEAFE"/>
  <path d="M386 30l3 3 5-5" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="390" y="72" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Security</text>

  <!-- Parking -->
  <rect x="424" y="4" width="52" height="52" rx="14" fill="#F0FDF4"/>
  <rect x="430" y="10" width="40" height="40" rx="6" stroke="#10B981" stroke-width="2" fill="#D1FAE5"/>
  <path d="M440 20h6a4 4 0 010 8h-6" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="440" y1="20" x2="440" y2="40" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  <text x="450" y="72" font-family="system-ui, Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Parking</text>

</svg>
