[pytest]
# ── Discovery ──────────────────────────────────────────────────────────────────
testpaths    = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Default options ────────────────────────────────────────────────────────────
# -v              verbose output
# --tb=short      compact tracebacks
# --html          generate HTML report after each run
# --self-contained-html  embed CSS/JS so report is portable
# -p no:warnings  suppress noisy 3rd-party warnings in console
addopts =
    -v
    --tb=short
    --html=reports/test_report.html
    --self-contained-html
    -p no:warnings

# ── Logging ────────────────────────────────────────────────────────────────────
log_cli       = true
log_cli_level = INFO
log_file      = reports/test_run.log
log_file_level = DEBUG
log_format    = [%(asctime)s] %(levelname)-8s %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# ── Markers (prevents PytestUnknownMarkWarning) ────────────────────────────────
markers =
    web:       Web UI tests — require a running browser and React frontend
    api:       REST API tests — require a running Django backend
    mobile:    Mobile tests — require Appium + Android/iOS device or emulator
    smoke:     Fast sanity-check tests (run on every commit)
    sprint_0:  Sprint 0 infrastructure & scaffold tests
    sprint_1:  Sprint 1 auth & user management tests
    sprint_2:  Sprint 2 buildings & apartment management tests
    sprint_3:  Sprint 3 expense management tests
    sprint_4:  Sprint 4 payment management tests
    sprint_5:  Sprint 5 dashboard tests
    sprint_6:  Sprint 6 notification system tests
    positive:  Happy-path / expected-success test cases
    negative:  Error-path / boundary / security test cases
