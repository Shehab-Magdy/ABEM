name: ABEM Automation Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "abem-automation/**"
      - "backend/**"
      - "frontend/**"
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"   # nightly full run at 02:00 UTC
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging]
      markers:
        description: "pytest marker expression (e.g. 'api or smoke')"
        required: false
        default: "api or smoke"

# ── Shared defaults ────────────────────────────────────────────────────────────
defaults:
  run:
    working-directory: abem-automation

env:
  ABEM_ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  PYTHON_VERSION: "3.12"

# ══════════════════════════════════════════════════════════════════════════════
# Job 1 — API Tests
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  api-tests:
    name: "API Tests"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: abem_test
          POSTGRES_USER: abem
          POSTGRES_PASSWORD: abem_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Python for backend ──────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements/development.txt
            abem-automation/requirements.txt

      # ── Install backend ─────────────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements/development.txt

      # ── Migrate & run Django ────────────────────────────────────────────────
      - name: Prepare database and start Django dev server
        working-directory: backend
        env:
          DATABASE_URL: postgres://abem:abem_password@localhost:5432/abem_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py migrate --settings=config.settings.development
          python manage.py shell -c "
          from apps.authentication.models import User
          if not User.objects.filter(email='admin@abem.local').exists():
              User.objects.create_superuser(
                  email='admin@abem.local',
                  password='Admin@1234',
                  first_name='CI',
                  last_name='Admin',
              )
          " --settings=config.settings.development
          nohup python manage.py runserver 0.0.0.0:8000 --settings=config.settings.development &
          sleep 5
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:8000/health/

      # ── Install automation framework ────────────────────────────────────────
      - name: Install automation dependencies
        run: pip install -r requirements.txt

      # ── Run API tests ───────────────────────────────────────────────────────
      - name: Run API smoke tests
        env:
          ABEM_ENVIRONMENT: dev
        run: |
          pytest tests/sprint_0/ -m "api or smoke" \
            --html=reports/sprint0_api_report.html \
            --self-contained-html \
            -v

      - name: Run Sprint 1 API tests
        env:
          ABEM_ENVIRONMENT: dev
        run: |
          pytest tests/sprint_1/ -m "api" \
            --html=reports/sprint1_api_report.html \
            --self-contained-html \
            -v \
            --reruns 1 \
            --reruns-delay 2

      # ── Upload artifacts ────────────────────────────────────────────────────
      - name: Upload API test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-reports
          path: |
            abem-automation/reports/
            abem-automation/screenshots/
          retention-days: 14

# ══════════════════════════════════════════════════════════════════════════════
# Job 2 — Web UI Tests
# ══════════════════════════════════════════════════════════════════════════════
  web-tests:
    name: "Web UI Tests"
    runs-on: ubuntu-latest
    needs: api-tests   # run after API tests to reduce infrastructure cost

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: abem_test
          POSTGRES_USER: abem
          POSTGRES_PASSWORD: abem_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements/development.txt
            abem-automation/requirements.txt

      # ── Install Node for frontend ────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── Install & start backend ─────────────────────────────────────────────
      - name: Install backend and start server
        working-directory: backend
        env:
          DATABASE_URL: postgres://abem:abem_password@localhost:5432/abem_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          pip install -r requirements/development.txt
          python manage.py migrate --settings=config.settings.development
          python manage.py shell -c "
          from apps.authentication.models import User
          if not User.objects.filter(email='admin@abem.local').exists():
              User.objects.create_superuser(email='admin@abem.local', password='Admin@1234', first_name='CI', last_name='Admin')
          " --settings=config.settings.development
          nohup python manage.py runserver 0.0.0.0:8000 --settings=config.settings.development &
          sleep 3

      # ── Install & build frontend ────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start frontend dev server
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000/api/v1
        run: |
          nohup npm run dev -- --host 0.0.0.0 --port 3000 &
          sleep 8
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:3000

      # ── Install Chrome ─────────────────────────────────────────────────────
      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@latest

      # ── Install automation framework ────────────────────────────────────────
      - name: Install automation dependencies
        run: pip install -r requirements.txt

      # ── Run Web UI tests ────────────────────────────────────────────────────
      - name: Run Web UI tests (headless)
        env:
          ABEM_ENVIRONMENT: dev
          HEADLESS: "true"
          BROWSER: chrome
        run: |
          pytest tests/ -m "web" \
            --html=reports/web_test_report.html \
            --self-contained-html \
            -v \
            --reruns 2 \
            --reruns-delay 3

      # ── Upload artifacts ────────────────────────────────────────────────────
      - name: Upload web test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-test-reports
          path: |
            abem-automation/reports/
            abem-automation/screenshots/
          retention-days: 14

# ══════════════════════════════════════════════════════════════════════════════
# Job 3 — Mobile Tests (manual trigger / nightly only)
# ══════════════════════════════════════════════════════════════════════════════
  mobile-tests:
    name: "Mobile Tests (Emulator)"
    runs-on: macos-latest   # macOS required for Android emulator KVM acceleration
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: api-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up JDK 17 (required for Android tools)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK and create emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          avd-name: ABEM_CI
          script: echo "Emulator ready"

      - name: Install Appium
        run: |
          npm install -g appium@2
          appium driver install uiautomator2
          nohup appium --relaxed-security &
          sleep 5

      - name: Install automation dependencies
        run: pip install -r requirements.txt

      - name: Run mobile tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ABEM_ENVIRONMENT: dev
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          avd-name: ABEM_CI
          script: |
            cd abem-automation
            pytest tests/ -m "mobile" \
              --html=reports/mobile_test_report.html \
              --self-contained-html \
              -v

      - name: Upload mobile test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-test-reports
          path: |
            abem-automation/reports/
            abem-automation/screenshots/
          retention-days: 14

# ══════════════════════════════════════════════════════════════════════════════
# Job 4 — Test Summary
# ══════════════════════════════════════════════════════════════════════════════
  summary:
    name: "Test Summary"
    runs-on: ubuntu-latest
    needs: [api-tests, web-tests]
    if: always()
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Display test result summary
        run: |
          echo "## ABEM Automation Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests  | ${{ needs.api-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Tests  | ${{ needs.web-tests.result }} |" >> $GITHUB_STEP_SUMMARY
