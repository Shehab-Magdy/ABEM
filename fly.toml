app = "abem-backend"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  DJANGO_SETTINGS_MODULE = "config.settings.production"
  DJANGO_DEBUG = "False"
  PORT = "8000"

[processes]
  web = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120"
  worker = "celery -A config worker --loglevel=info"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.http_checks]
    enabled = true
    grace_period = "10s"
    interval = "30s"
    timeout = "5s"
    method = "GET"
    path = "/api/v1/"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
