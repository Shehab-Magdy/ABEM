[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/test_report.html
    --self-contained-html
    -p no:warnings

log_cli = true
log_cli_level = INFO
log_file = reports/test_run.log
log_file_level = DEBUG
log_format = [%(asctime)s] %(levelname)-8s %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

timeout = 30

markers =
    smoke: Quick health-check suite
    regression: Full regression suite
    e2e: End-to-end user journey tests
    api: API-layer tests (no browser)
    ui: UI-layer tests (browser required)
    db: Database-layer assertion tests
    security: Security and penetration tests
    performance: Performance and timing tests
    accessibility: Accessibility compliance tests
    positive: Happy-path scenarios
    negative: Error and edge-case scenarios
    boundary: Boundary value analysis
    auth: Authentication and authorization
    buildings: Building management
    apartments: Apartment management
    expenses: Expense management
    payments: Payment management
    notifications: Notification system
    exports: Data export functionality
    dashboard: Dashboard aggregations
    categories: Expense categories
    file_upload: File upload functionality
    pagination: Pagination and filtering
    rbac: Role-based access control
    tenant_isolation: Multi-tenant isolation
    injection: Injection attack prevention
    owasp: OWASP Top 10 coverage
    financial: Expense split and payment balance tests
    load: Locust load tests
    sprint1: Sprint 1 — Auth & User Management
    sprint2: Sprint 2 — Buildings & Apartments
    sprint3: Sprint 3 — Expense Management
    sprint4: Sprint 4 — Payment Management
    sprint5: Sprint 5 — Dashboards
    sprint6: Sprint 6 — Notifications
    sprint8: Sprint 8 — Audit & Exports
