name: Nightly — Full Regression

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

defaults:
  run:
    working-directory: abem-playwright

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: abem
          POSTGRES_USER: abem
          POSTGRES_PASSWORD: abem
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run full regression suite
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          OWNER_PASSWORD: ${{ secrets.OWNER_PASSWORD }}
          ADMIN2_EMAIL: ${{ secrets.ADMIN2_EMAIL }}
          ADMIN2_PASSWORD: ${{ secrets.ADMIN2_PASSWORD }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: abem
          DB_USER: abem
          DB_PASSWORD: abem
          HEADLESS: true
        run: |
          pytest \
            -m "not performance" \
            -n auto \
            --html=reports/nightly_report.html \
            --self-contained-html \
            --alluredir=allure-results \
            --timeout=300 \
            --reruns=2 \
            --reruns-delay=5

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-reports
          path: |
            abem-playwright/reports/
            abem-playwright/allure-results/
          retention-days: 30
